<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>São Luiz Saúde</title>
<style>
* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Segoe UI', sans-serif;
}

body {
background-color: #dfe6e9;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

#chat-container {
width: 400px;
height: 550px;
background: white;
border-radius: 15px;
box-shadow: 0 10px 30px rgba(0,0,0,0.15);
display: flex;
flex-direction: column;
overflow: hidden;
}

/* Header */
#chat-header {
background: #2c3e50;
color: white;
padding: 15px;
display: flex;
align-items: center;
justify-content: space-between;
border-bottom: 4px solid #f39c12;
}

.brand {
display: flex;
align-items: center;
gap: 10px;
}

.logo-box {
width: 35px;
height: 35px;
background: #f39c12;
border-radius: 5px;
display: flex;
justify-content: center;
align-items: center;
font-weight: bold;
font-size: 12px;
}

#clock {
font-family: monospace;
font-size: 13px;
opacity: 0.8;
}

/* Janela */
#chat-window {
flex: 1;
padding: 20px;
overflow-y: auto;
background: #f9f9f9;
display: flex;
flex-direction: column;
gap: 10px;
}

.msg {
padding: 10px 14px;
border-radius: 15px;
font-size: 14px;
max-width: 80%;
word-wrap: break-word;
}

.user {
background: #3498db;
color: white;
align-self: flex-end;
border-bottom-right-radius: 2px;
}

.bot {
background: #ecf0f1;
color: #2c3e50;
align-self: flex-start;
border-bottom-left-radius: 2px;
border: 1px solid #bdc3c7;
}

/* Controles */
#input-area {
display: flex;
padding: 15px;
background: #fff;
border-top: 1px solid #eee;
}

#user-input {
flex: 1;
padding: 10px;
border: 1px solid #ddd;
border-radius: 20px;
outline: none;
}

#send-btn {
background: #27ae60;
color: white;
border: none;
padding: 0 15px;
margin-left: 8px;
border-radius: 20px;
cursor: pointer;
transition: 0.3s;
}

#send-btn:hover {
background: #219150;
}
</style>
</head>
<body>

<div id="chat-container">
<div id="chat-header">
<div class="brand">
<div class="logo-box">SLS</div>
<span>ChatBoot</span>
</div>
<div id="clock">00:00</div>
</div>

<div id="chat-window">
<div class="msg bot">Olá! Sou o assistente do São Luiz Saúde. Como posso ajudar?<br> 1 - Horario de Funcionamento<br> 2 - Segunda via de Boleto<br> 3 - Autorizações<br> 4 - Ouvidoria<br> 5 - Consultas<br> 6 - Carterinha <br> 7 - Rede Credenciada<br></div>
</div>

<div id="input-area">
<input type="text" id="user-input" placeholder="Pergunte sobre nosso Convênio" autocomplete="off">
<button id="send-btn">Enviar</button>
</div>
</div>

<script>
// 1. Relógio
function updateTime() {
const now = new Date();
document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}
setInterval(updateTime, 1000);
updateTime();

// 2. Banco de Dados (Respostas)
const brain = [
{ key: "1", resp: "Horário de atendimento das 7h15 as 16h45 de segunda a sexta-feira." },
{ key: "2", resp: "Para emissão da 2ª via do boleto, acesse o site: https://associacaosaoluizsaude.com.br/ No canto superior direito, clique na opção “2ª via de boleto” ou acesse diretamente pelo link. Em seguida, informe o CPF do titular do plano. Para pessoa jurídica, é necessário informar o CNPJ da empresa." },
{ key: "3", resp: "Para qualquer autorização deverá procurar a sede administrativa da operadora presencialmente no endereço: Rua Coronel André Ulson Jr, nº. 248- Centro. Araras/Sp. Cep: 13.600-690. Horário de atendimento das 7h15 as 16h45 de segunda a sexta-feira." },
{ key: "4", resp: "A Ouvidoria é unidade de segunda instância e deve ser acionada depois que já entrou em contato por telefone ou presencial com o Serviço Social/ Serviço de Atendimento ao Cliente da operadora. A Ouvidoria tem por objetivo acolher as manifestações dos beneficiários, tais como elogios, sugestões, consultas e reclamações, de modo a tentar resolver conflitos que surjam no atendimento ao público, e subsidiar aperfeiçoamento dos processos de trabalho da operadora e o prazo de resposta é de até 7 ( sete) dias úteis. Telefone: (19) 3541- 2107 E-mail: ouvidoriasls@iscma.com.br" },
{ key: "5", resp: "A Guia de consulta da rede credenciada em Araras é emitida diretamente no consultório médico; exceto se for mesma especialidade dentro de 30 dias deverá procurar a sede administrativa da operadora presencialmente no endereço: Rua Coronel André Ulson Jr, nº. 248- Centro. Araras/Sp- Cep: 13.600-690. Horário de atendimento das 7h15 as 16h45 de segunda a sexta-feira." },
{ key: "6", resp: "A operadora fornece na contratação do plano de saúde. Enquanto não chega a carteirinha, pode utilizar o plano normalmente tendo um documento de identificação com foto. Para solicitar a 2ª. via deve entrar em contato presencialmente no setor comercial ou baixar o app no Google Play ou a App Storee e procurar o nome São Luiz Saúde." },
{ key: "7", resp: "A rede credenciada do convênio São Luiz Saúde, pode ser acessada pelo site ou baixar o aplicativo no celular (App Store ou play store). www.associacaosaoluizsaude.com.br: clicar em busca online> rede credenciada> selecionar o seu plano ou o último plano> escolher a especialidade e clicar na “lupinha azul” que aparecerá os credenciados, podendo salvar em pdf ou outro." },
{ key: "solda", resp: "Trabalhamos com processos MIG e TIG certificados." },
{ key: "materiais", resp: "Processamos Aço Carbono, Inox e Alumínio." },
{ key: "entrega", resp: "Entregamos via transportadora em todo o Brasil." },
{ key: "endereco", resp: "Rua Industrial, 500. Venha tomar um café conosco!" },
{ key: "contato", resp: "Ligue para (11) 4002-8922 ou chame no WhatsApp." },
{ key: "horario", resp: "Atendemos de segunda a sexta, das 07:30 às 17:30." },
{ key: "pintura", resp: "Oferecemos pintura eletrostática a pó em várias cores." },
{ key: "vagas", resp: "Cadastre seu currículo no e-mail: rh@metalurgicatech.com.br." },
{ key: "usinagem", resp: "Sim, realizamos serviços de usinagem em centros CNC." }
];

// Variáveis globais (conforme as novas fotos)
const windowChat = document.getElementById('chat-window');
const inputField = document.getElementById('user-input');
const button = document.getElementById('send-btn');

function sendMessage() {
const text = inputField.value.trim();
if (text === "") return;

// Mensagem do Usuário
appendMsg(text, 'user');
inputField.value = "";

// Resposta do Bot
const response = findResponse(text);
setTimeout(() => {
appendMsg(response, 'bot');
}, 500);
}

function findResponse(userInput) {
const cleanInput = userInput.toLowerCase();
// Tenta achar a chave no banco de dados
const match = brain.find(item => cleanInput.includes(item.key));
return match ? match.resp : "Desculpe, não entendi. Tente termos como: orçamento, prazo ou materiais.";
}

function appendMsg(text, side) {
const div = document.createElement('div');
div.className = `msg ${side}`;
div.innerText = text;
windowChat.appendChild(div);

// Scroll automático
windowChat.scrollTop = windowChat.scrollHeight;
}

// Eventos
button.onclick = sendMessage;
inputField.onkeypress = (e) => {
if (e.key === 'Enter') sendMessage();
};

</script>
</body>
</html>
